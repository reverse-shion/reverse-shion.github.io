<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>この恋の現在地診断｜詩韻 -シオン-</title>
  <meta name="description" content="無料でこの恋の現在地を確認。2人の星命カードと現在地カードから、惹かれる理由と距離感を読み解きます。">
  <link rel="stylesheet" href="./css/style.css?v=20260527-02">
  <script src="./js/validation.js?v=20260527-02" defer></script>
  <script src="./js/report-renderer.js?v=20260527-02" defer></script>
  <script src="./js/main.js?v=20260527-02" defer></script>
</head>
<body>
  <main class="page">
    <section class="hero card">
      <p class="eyebrow">SHION LOVE READING</p>
      <h1>なぜ惹かれるのに、不安になるのか。</h1>
      <p class="subtle">2人の星命から、この恋の現在地を読み解きます。</p>
      <p>この恋の現在地診断は、あなたとお相手の星命カード・現在地カードを照らし合わせ、2人が惹かれ合う理由と、すれ違いやすい場所を読み解く恋愛診断です。</p>
      <p>相性が良い・悪いを決めつけるものではありません。</p>
      <a href="#form" class="cta">無料でこの恋の現在地を見る</a>
      <a href="#premium-reading" class="cta ghost">相手の本音をタロットで見る</a>
    </section>

    <section id="form" class="card">
      <h2>診断フォーム</h2>
      <div class="mode-switch">
        <label><input type="radio" name="diagnosisType" value="pair" checked> この恋の現在地診断</label>
        <label><input type="radio" name="diagnosisType" value="single"> 星命現在地診断</label>
      </div>
      <p class="subtle">初期設定は2人相性診断です。お相手の本名は不要です。ニックネームやイニシャルでも診断できます。住所・電話番号などの個人情報は入力しないでください。</p>
      <form id="readingForm" novalidate>
        <div id="pairFields">
          <h3>あなた</h3>
          <label>あなたの名前・ニックネーム<input id="userName" type="text" required></label>
          <label>あなたの生年月日<input id="userBirthDate" type="date" required></label>
          <h3>お相手</h3>
          <label>お相手の呼び名・ニックネーム<input id="partnerName" type="text" required></label>
          <label>お相手の生年月日<input id="partnerBirthDate" type="date" required></label>
        </div>
        <div id="singleFields" hidden>
          <label>名前・ニックネーム<input id="singleName" type="text"></label>
          <label>生年月日<input id="singleBirthDate" type="date"></label>
        </div>
        <label>診断日<input id="readingDate" type="date" required></label>
        <button type="submit">無料でこの恋の現在地を見る</button>
        <p id="msg" class="msg"></p>
      </form>
    </section>

    <section id="result" aria-live="polite"></section>
  </main>
</body>
</html>
