<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>詩韻式 星命未来鑑定</title>
  <meta name="description" content="星命とタロットを重ね、今のあなたに必要な言葉を読み解く詩韻式鑑定体験ページ。">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <main class="page">
    <section class="hero"><h1>詩韻式 星命未来鑑定</h1><p>星命とタロットを重ね、今のあなたに必要な言葉を読み解きます。</p></section>
    <section class="intro"><p>ここから、あなたの星命を静かに開いていきます。運の良し悪しではなく、力の使い方と次の一歩を一緒に見ていきましょう。</p></section>
    <section class="panel">
      <h2>鑑定の準備</h2><p>まず、あなたの星命を開くために必要な情報を教えてください。詳しく書かなくても大丈夫です。</p>
      <form id="readingForm" autocomplete="off">
        <label>名前（任意）<input id="name" type="text" maxlength="40" placeholder="未入力なら ご相談者さま"></label>
        <label>生年月日（必須）<input id="birthDate" type="date" required min="1900-01-01"></label>
        <label>鑑定対象年<select id="targetYear"><option>2026</option><option>2027</option><option>2028</option></select></label>
        <label>性別（任意）<select id="gender"><option value="">回答しない</option><option>男性</option><option>女性</option><option>その他</option></select></label>
        <label>相談ジャンル<select id="topic" required><option value="">選択してください</option><option>総合</option><option>恋愛</option><option>仕事</option><option>金運</option><option>人間関係</option><option>今月の運勢</option></select></label>
        <label>悩みメモ（任意）<textarea id="memo" rows="3"></textarea></label>
        <label>タロット展開<select id="spread"><option value="1">1枚引き</option><option value="2">2枚引き</option><option value="3" selected>3枚引き</option><option value="4">4枚引き</option><option value="5">5枚引き</option></select></label>
        <label>タロットカード<select id="tarot"><option value="">今回は星命を中心に見る</option></select></label>
        <div class="buttons"><button type="submit">星命を開く</button><button type="button" id="demo">デモ入力</button><button type="button" id="reset">入力リセット</button><button type="button" id="copy">鑑定文をコピー</button></div>
      </form>
      <p id="msg" class="msg"></p>
    </section>
    <section id="result" class="result"></section>
    <section class="note"><p>入力内容はブラウザ上の処理にのみ使用し、保存されません。個人名・住所・連絡先など、不要な個人情報は入力しないでください。</p><p>占いは未来を保証するものではなく、自分の心と向き合うための参考としてお楽しみください。</p></section>
  </main>
  <script src="./js/sanmei-data.js"></script>
  <script src="./js/sanmei-engine.js"></script>
  <script src="./js/tarot-78.js"></script>
  <script src="./js/seimei-types.js"></script>
  <script src="./data/category-themes.js"></script>
  <script src="./data/monthly-themes.js"></script>
  <script src="./data/years/2026.js"></script>
  <script src="./data/years/2027.js"></script>
  <script src="./data/years/2028.js"></script>
  <script src="./js/tarot-data.js"></script>
  <script src="./js/reading-engine.js"></script>
  <script src="./js/text-composer.js"></script>
  <script src="./js/ui-renderer.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
